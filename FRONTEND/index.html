<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Votação 2026 v.1</title>
    <style>
        /* ================= RESET & BASE ================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================= MATRIX EFFECT ================ */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.6;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(0, 15, 0, 0.85) 0%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 1;
        }

        /* ================= LAYOUT PRINCIPAL ================ */
        .main-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* LADO ESQUERDO (BRANDING) */
        .branding-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            color: white;
            background: rgba(0, 20, 0, 0.4);
            backdrop-filter: blur(5px);
            border-right: 1px solid rgba(0, 255, 136, 0.2);
            position: relative;
            overflow: hidden;
        }

        .branding-side h1 {
            font-size: 4rem;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1;
            animation: pulseText 3s infinite alternate;
        }

        .branding-side p {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .branding-badge {
            margin-top: 30px;
            padding: 10px 20px;
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
            font-size: 0.9rem;
            border-radius: 50px;
            background: rgba(0, 255, 136, 0.1);
        }

        /* LADO DIREITO (FORMULÁRIO) */
        .form-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(0, 25, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.15);
            animation: slideIn 0.8s ease-out;
        }

        /* TABS (LOGIN / CADASTRO) */
        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab.active {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.05));
            color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* INPUTS */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #00ff88;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        input,
        select {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 136, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            background: rgba(0, 20, 0, 0.8);
        }

        select {
            cursor: pointer;
            appearance: none;
        }

        select option {
            background: #001400;
            color: white;
        }

        /* BOTÃO SHOW/HIDE PASSWORD - SVG PROFISSIONAL */
        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .toggle-pass svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #00ff88;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .toggle-pass:hover svg {
            opacity: 1;
            filter: drop-shadow(0 0 5px rgba(0, 255, 136, 0.8));
        }

        /* BOTÃO SUBMIT */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.7);
        }

        /* ALERTAS */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .alert-error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        /* RESPONSIVO (CELULAR) */
        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }

            .branding-side {
                flex: none;
                padding: 40px 20px 20px;
                border-right: none;
                border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            }

            .branding-side h1 {
                font-size: 2.5rem;
            }

            .branding-badge {
                display: none;
            }

            .form-side {
                flex: 1;
                padding: 20px;
            }

            .login-card {
                padding: 25px;
            }
        }

        @keyframes pulseText {
            0% {
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            }

            100% {
                text-shadow: 0 0 60px rgba(0, 255, 136, 0.9), 0 0 100px rgba(0, 255, 136, 0.5);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- MATRIX BACKGROUND -->
    <canvas id="matrix"></canvas>
    <div class="overlay"></div>

    <div class="main-wrapper">
        <!-- LADO ESQUERDO -->
        <div class="branding-side">
            <h1>CLICA<br>E SOFRE</h1>
            <p>Sistema de Votação Digital 2026</p>
            <div class="branding-badge">🔒 Ambiente Seguro</div>
        </div>

        <!-- LADO DIREITO -->
        <div class="form-side">
            <div class="login-card">
                <!-- Tabs -->
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('login')">🔐 Login</div>
                    <div class="tab" onclick="switchTab('cadastro')">📝 Cadastro</div>
                </div>

                <!-- Alert Box -->
                <div id="alert" class="alert"></div>

                <!-- Form Login -->
                <form id="loginForm" class="form active">
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="loginEmail" placeholder="seu.email@escola.com" required>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginSenha" placeholder="••••••••" required>
                            <button type="button" class="toggle-pass" onclick="togglePass('loginSenha', this)">
                                <!-- Ícone Olho Aberto (SVG) -->
                                <svg class="eye-icon" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <!-- Ícone Olho Fechado (SVG) - Hidden por padrão -->
                                <svg class="eye-off-icon" viewBox="0 0 24 24" style="display: none;">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Entrar no Sistema</button>
                </form>

                <!-- Form Cadastro -->
                <form id="cadastroForm" class="form">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="cadastroNome" placeholder="Nome e Sobrenome" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="cadastroEmail" placeholder="seu.email@escola.com" required>
                    </div>
                    <div class="form-group">
                        <label>Turma</label>
                        <select id="cadastroTurma" required>
                            <option value="" disabled selected>Selecione sua turma</option>
                            <option value="6º Ano A">6º Ano A</option>
                            <option value="6º Ano B">6º Ano B</option>
                            <option value="7º Ano A">7º Ano A</option>
                            <option value="7º Ano B">7º Ano B</option>
                            <option value="8º Ano A">8º Ano A</option>
                            <option value="8º Ano B">8º Ano B</option>
                            <option value="9º Ano A">9º Ano A</option>
                            <option value="9º Ano B">9º Ano B</option>
                            <option value="1º Ano A">1º Ano A</option>
                            <option value="1º Ano B">1º Ano B</option>
                            <option value="2º Ano A">2º Ano A</option>
                            <option value="2º Ano B">2º Ano B</option>
                            <option value="3º Ano A">3º Ano A</option>
                            <option value="3º Ano B">3º Ano B</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="cadastroSenha" placeholder="Mínimo 6 caracteres" required
                                minlength="6">
                            <button type="button" class="toggle-pass" onclick="togglePass('cadastroSenha', this)">
                                <svg class="eye-icon" viewBox="0 0 24 24">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="eye-off-icon" viewBox="0 0 24 24" style="display: none;">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Criar Conta</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ================= MATRIX SCRIPT =================
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff88';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // ================= LOGIC =================
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.style.display = 'none');
            document.getElementById('alert').style.display = 'none';

            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('cadastroForm').style.display = 'block';
            }
        }

        document.getElementById('cadastroForm').style.display = 'none';

        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const eyeIcon = btn.querySelector('.eye-icon');
            const eyeOffIcon = btn.querySelector('.eye-off-icon');

            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                input.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alert');
            alert.textContent = msg;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { email: document.getElementById('loginEmail').value, senha: document.getElementById('loginSenha').value };
            try {
                const res = await fetch('http://localhost:3000/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const json = await res.json();
                if (res.ok) {
                    localStorage.setItem('usuario_id', json.usuario_id);
                    localStorage.setItem('turma', json.turma);
                    window.location.href = 'chapas.html';
                } else { showAlert(json.erro, 'error'); }
            } catch (e) { showAlert('Erro de conexão.', 'error'); }
        });

        // CADASTRO
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nome: document.getElementById('cadastroNome').value,
                turma: document.getElementById('cadastroTurma').value,
                email: document.getElementById('cadastroEmail').value,
                senha: document.getElementById('cadastroSenha').value
            };
            try {
                const res = await fetch('http://localhost:3000/cadastrar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const json = await res.json();
                if (res.ok) { showAlert('Cadastro realizado! Faça login.', 'success'); setTimeout(() => switchTab('login'), 1500); }
                else { showAlert(json.erro, 'error'); }
            } catch (e) { showAlert('Erro de conexão.', 'error'); }
        });
    </script>
</body>

</html>
