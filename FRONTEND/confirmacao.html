<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voto Registrado - Sistema de Votação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Canvas Matrix Background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.25;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, rgba(0, 20, 0, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 1;
        }

        /* Container Principal */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Glassmorphism */
        .card {
            background: linear-gradient(145deg, rgba(0, 40, 0, 0.8) 0%, rgba(0, 20, 0, 0.9) 100%);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 136, 0.4);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 0 80px rgba(0, 255, 136, 0.2), inset 0 0 40px rgba(0, 255, 136, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho no card */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1) 0%, transparent 60%);
            pointer-events: none;
            border-radius: 30px;
        }

        /* Ícone de Check Animado */
        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
        }

        .check-circle {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseBorder 2s infinite;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        @keyframes pulseBorder {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(0, 255, 136, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 136, 0);
            }
        }

        .check-mark {
            width: 50px;
            height: 50px;
            stroke: #00ff88;
            stroke-width: 5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s 0.3s ease-out forwards;
            filter: drop-shadow(0 0 5px rgba(0, 255, 136, 0.8));
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Textos */
        h1 {
            color: #00ff88;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 1px;
        }

        p.message {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .secure-note {
            color: rgba(0, 255, 136, 0.7);
            font-size: 0.9rem;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .secure-note svg {
            width: 16px;
            height: 16px;
            fill: #00ff88;
        }

        /* Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 30px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            border: 2px solid transparent;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: #00ff88;
            border: 2px solid rgba(0, 255, 136, 0.4);
        }

        .btn-secondary:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        /* Animação de entrada */
        .card>* {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s ease-out forwards;
        }

        .success-icon {
            animation-delay: 0.1s;
        }

        h1 {
            animation-delay: 0.2s;
        }

        p.message {
            animation-delay: 0.3s;
        }

        .secure-note {
            animation-delay: 0.4s;
        }

        .btn-group {
            animation-delay: 0.5s;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .success-icon {
                width: 80px;
                height: 80px;
            }

            .check-mark {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <div class="card">
            <!-- Ícone Animado -->
            <div class="success-icon">
                <div class="check-circle">
                    <svg class="check-mark" viewBox="0 0 52 52">
                        <path d="M14 27.42l10 10 16-16" />
                    </svg>
                </div>
            </div>

            <!-- Conteúdo -->
            <h1>Voto Registrado</h1>
            <p class="message">Sua participação foi computada com sucesso no sistema de votação.</p>

            <div class="secure-note">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8z" />
                </svg>
                <span>Votação anônima e segura garantida.</span>
            </div>

            <!-- Botões de Ação -->
            <div class="btn-group">
                <a href="resultados.html" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    Ver Resultados ao Vivo
                </a>
                <a href="index.html" class="btn btn-secondary">
                    Sair
                </a>
            </div>
        </div>
    </div>

    <script>
        // ==========================
        //  EFEITO MATRIX OTIMIZADO
        // ==========================
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff88';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
    </script>
</body>

</html>
